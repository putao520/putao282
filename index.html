<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Putao282 - OpenClaw AI Gateway</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #FAF9F6;
    color: #1a1a1a;
    overflow: hidden;
  }

  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    text-align: center;
    position: relative;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -10%;
    left: 50%;
    transform: translateX(-50%);
    width: 900px;
    height: 900px;
    background: radial-gradient(circle, rgba(217, 119, 6, 0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Logo 组合 */
  .logo-group {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 40px;
    animation: fadeIn 0.6s ease;
  }

  .logo-item {
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  .logo-item:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
  }

  .logo-item svg { width: 28px; height: 28px; }

  .logo-item.lobster {
    font-size: 28px;
    background: rgba(217, 119, 6, 0.06);
    border: 1px solid rgba(217, 119, 6, 0.1);
  }

  .divider-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: #ddd;
  }

  /* badge */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 16px;
    border-radius: 20px;
    background: rgba(217, 119, 6, 0.08);
    color: #d97706;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 28px;
    animation: fadeIn 0.6s ease;
  }

  .badge::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #d97706;
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  h1 {
    font-size: clamp(36px, 5.5vw, 68px);
    font-weight: 800;
    line-height: 1.08;
    letter-spacing: -2px;
    color: #1a1a1a;
    max-width: 800px;
    margin-bottom: 20px;
    animation: fadeIn 0.6s ease 0.1s both;
  }

  h1 em {
    font-style: normal;
    background: linear-gradient(135deg, #d97706, #ea580c);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-desc {
    font-size: 17px;
    line-height: 1.7;
    color: #777;
    max-width: 480px;
    margin-bottom: 48px;
    animation: fadeIn 0.6s ease 0.2s both;
  }

  /* 模型标签行 */
  .model-tags {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    animation: fadeIn 0.6s ease 0.3s both;
  }

  .model-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 10px;
    background: #fff;
    border: 1px solid rgba(0, 0, 0, 0.06);
    font-size: 13px;
    font-weight: 500;
    color: #555;
    transition: all 0.2s;
  }

  .model-tag:hover {
    border-color: rgba(0, 0, 0, 0.12);
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
  }

  .model-tag svg { width: 16px; height: 16px; flex-shrink: 0; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 640px) {
    .logo-group { gap: 12px; }
    .logo-item { width: 40px; height: 40px; border-radius: 12px; }
    .logo-item svg { width: 22px; height: 22px; }
    .logo-item.lobster { font-size: 22px; }
    h1 { letter-spacing: -1px; }
    .hero-desc { font-size: 15px; }
    .model-tags { gap: 8px; }
    .model-tag { padding: 6px 12px; font-size: 12px; }
  }
</style>
