<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Putao282 - AI API Platform</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #FAF9F6;
    color: #1a1a1a;
    overflow-x: hidden;
  }

  /* 导航栏 */
  nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    padding: 0 48px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(250, 249, 246, 0.8);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(0, 0, 0, 0.06);
  }

  .logo {
    font-size: 18px;
    font-weight: 700;
    color: #1a1a1a;
    letter-spacing: -0.5px;
  }

  .logo span { color: #d97706; }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 32px;
    list-style: none;
  }

  .nav-links a {
    font-size: 14px;
    font-weight: 500;
    color: #666;
    text-decoration: none;
    transition: color 0.2s;
  }

  .nav-links a:hover { color: #1a1a1a; }

  .nav-btn {
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    background: #1a1a1a;
    border: none;
    padding: 8px 20px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .nav-btn:hover { background: #333; }

  /* Hero */
  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 120px 24px 80px;
    text-align: center;
    position: relative;
  }

  /* 背景装饰 */
  .hero::before {
    content: '';
    position: absolute;
    top: -20%;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 800px;
    background: radial-gradient(circle, rgba(217, 119, 6, 0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 16px;
    border-radius: 20px;
    background: rgba(217, 119, 6, 0.08);
    color: #d97706;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 32px;
    animation: fadeIn 0.6s ease;
  }

  .badge::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #d97706;
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  h1 {
    font-size: clamp(40px, 6vw, 72px);
    font-weight: 800;
    line-height: 1.08;
    letter-spacing: -2px;
    color: #1a1a1a;
    max-width: 800px;
    margin-bottom: 24px;
    animation: fadeIn 0.6s ease 0.1s both;
  }

  h1 em {
    font-style: normal;
    background: linear-gradient(135deg, #d97706, #ea580c);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-desc {
    font-size: 18px;
    line-height: 1.7;
    color: #666;
    max-width: 520px;
    margin-bottom: 40px;
    animation: fadeIn 0.6s ease 0.2s both;
  }

  .hero-actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    animation: fadeIn 0.6s ease 0.3s both;
  }

  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    background: #1a1a1a;
    padding: 14px 28px;
    border-radius: 12px;
    text-decoration: none;
    transition: all 0.2s;
    border: none;
    cursor: pointer;
  }

  .btn-primary:hover { background: #333; transform: translateY(-1px); }

  .btn-secondary {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 15px;
    font-weight: 600;
    color: #1a1a1a;
    background: #fff;
    padding: 14px 28px;
    border-radius: 12px;
    text-decoration: none;
    border: 1px solid rgba(0, 0, 0, 0.1);
    transition: all 0.2s;
    cursor: pointer;
  }

  .btn-secondary:hover { background: #f5f5f5; transform: translateY(-1px); }

  /* 特色标签 */
  .features {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 64px;
    animation: fadeIn 0.6s ease 0.4s both;
  }

  .feature {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .feature-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .feature-icon.orange { background: rgba(217, 119, 6, 0.1); }
  .feature-icon.green { background: rgba(5, 150, 105, 0.1); }
  .feature-icon.blue { background: rgba(37, 99, 235, 0.1); }

  .feature-text {
    font-size: 13px;
    font-weight: 500;
    color: #555;
    text-align: left;
  }

  .feature-text strong {
    display: block;
    color: #1a1a1a;
    font-weight: 600;
    margin-bottom: 1px;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* 移动端适配 */
  @media (max-width: 640px) {
    nav { padding: 0 20px; }
    .nav-links { display: none; }
    .hero { padding: 100px 20px 60px; }
    h1 { letter-spacing: -1px; }
    .hero-desc { font-size: 16px; }
    .features { gap: 16px; }
  }
</style>
</head>
<body>

<nav>
  <div class="logo">putao<span>282</span></div>
  <ul class="nav-links">
    <li><a href="https://rpa.putao282.com" target="_blank">API Platform</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="https://rpa.putao282.com" target="_blank">Docs</a></li>
    <li><a href="about.html"><button class="nav-btn">Contact</button></a></li>
  </ul>
</nav>

<section class="hero">
  <div class="badge">AI API 现已开放</div>
  <h1>AI 赋能<br><em>龙虾养殖</em>与编程</h1>
  <p class="hero-desc">为龙虾养殖户和开发者提供一站式 AI API 服务，智能管理养殖数据，加速编程开发效率。</p>
  <div class="hero-actions">
    <a href="https://rpa.putao282.com" target="_blank" class="btn-primary">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      开始使用
    </a>
    <a href="about.html" class="btn-secondary">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      联系我们
    </a>
  </div>

  <div class="features">
    <div class="feature">
      <div class="feature-icon orange">🦞</div>
      <div class="feature-text"><strong>智能养殖</strong>AI 驱动的养殖决策</div>
    </div>
    <div class="feature">
      <div class="feature-icon green">⚡</div>
      <div class="feature-text"><strong>极速响应</strong>低延迟 API 调用</div>
    </div>
    <div class="feature">
      <div class="feature-icon blue">🛠</div>
      <div class="feature-text"><strong>开发加速</strong>Copilot 级编程辅助</div>
    </div>
  </div>
</section>

</body>
</html>
