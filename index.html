<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Putao282 - AI API Platform</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #FAF9F6;
    color: #1a1a1a;
    overflow: hidden;
  }

  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    text-align: center;
    position: relative;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -20%;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 800px;
    background: radial-gradient(circle, rgba(217, 119, 6, 0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 16px;
    border-radius: 20px;
    background: rgba(217, 119, 6, 0.08);
    color: #d97706;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 32px;
    animation: fadeIn 0.6s ease;
  }

  .badge::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #d97706;
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  h1 {
    font-size: clamp(40px, 6vw, 72px);
    font-weight: 800;
    line-height: 1.08;
    letter-spacing: -2px;
    color: #1a1a1a;
    max-width: 800px;
    margin-bottom: 24px;
    animation: fadeIn 0.6s ease 0.1s both;
  }

  h1 em {
    font-style: normal;
    background: linear-gradient(135deg, #d97706, #ea580c);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-desc {
    font-size: 18px;
    line-height: 1.7;
    color: #666;
    max-width: 520px;
    animation: fadeIn 0.6s ease 0.2s both;
  }

  .features {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 56px;
    animation: fadeIn 0.6s ease 0.3s both;
  }

  .feature {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .feature-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .feature-icon.orange { background: rgba(217, 119, 6, 0.1); }
  .feature-icon.green { background: rgba(5, 150, 105, 0.1); }
  .feature-icon.blue { background: rgba(37, 99, 235, 0.1); }

  .feature-text {
    font-size: 13px;
    font-weight: 500;
    color: #555;
    text-align: left;
  }

  .feature-text strong {
    display: block;
    color: #1a1a1a;
    font-weight: 600;
    margin-bottom: 1px;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 640px) {
    h1 { letter-spacing: -1px; }
    .hero-desc { font-size: 16px; }
    .features { gap: 16px; }
  }
</style>
</head>
<body>

<section class="hero">
  <div class="badge">AI API 现已开放</div>
  <h1>AI 赋能<br><em>龙虾养殖</em>与编程</h1>
  <p class="hero-desc">为龙虾养殖户和开发者提供一站式 AI API 服务，智能管理养殖数据，加速编程开发效率。</p>
  <div class="features">
    <div class="feature">
      <div class="feature-icon orange">🦞</div>
      <div class="feature-text"><strong>智能养殖</strong>AI 驱动的养殖决策</div>
    </div>
    <div class="feature">
      <div class="feature-icon green">⚡</div>
      <div class="feature-text"><strong>极速响应</strong>低延迟 API 调用</div>
    </div>
    <div class="feature">
      <div class="feature-icon blue">🛠</div>
      <div class="feature-text"><strong>开发加速</strong>Copilot 级编程辅助</div>
    </div>
  </div>
</section>

</body>
</html>
