<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>联系我们</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a0a;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    padding: 20px;
    overflow: hidden;
  }

  /* 背景光效 */
  .bg-glow {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .bg-glow::before,
  .bg-glow::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.4;
    animation: float 8s ease-in-out infinite;
  }

  .bg-glow::before {
    width: 500px;
    height: 500px;
    background: #07c160;
    top: -150px;
    right: -100px;
  }

  .bg-glow::after {
    width: 400px;
    height: 400px;
    background: #2aae67;
    bottom: -100px;
    left: -80px;
    animation-delay: -4s;
  }

  @keyframes float {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(30px, -20px) scale(1.05); }
  }

  /* 粒子点缀 */
  .particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .particle {
    position: absolute;
    width: 3px;
    height: 3px;
    background: rgba(7, 193, 96, 0.5);
    border-radius: 50%;
    animation: drift linear infinite;
  }

  @keyframes drift {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
  }

  /* 主卡片 */
  .card {
    position: relative;
    z-index: 1;
    background: rgba(255, 255, 255, 0.04);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 24px;
    padding: 48px 44px 40px;
    text-align: center;
    max-width: 400px;
    width: 100%;
    animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    opacity: 0;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* 微信图标 */
  .wechat-icon {
    width: 56px;
    height: 56px;
    background: #07c160;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    box-shadow: 0 8px 32px rgba(7, 193, 96, 0.3);
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 8px 32px rgba(7, 193, 96, 0.3); }
    50% { box-shadow: 0 8px 48px rgba(7, 193, 96, 0.5); }
  }

  .wechat-icon svg {
    width: 32px;
    height: 32px;
    fill: #fff;
  }

  .title {
    font-size: 22px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 6px;
    letter-spacing: 0.5px;
  }

  .subtitle {
    font-size: 13px;
    color: rgba(255, 255, 255, 0.4);
    margin-bottom: 32px;
    letter-spacing: 2px;
  }

  /* 二维码区域 */
  .qr-wrapper {
    position: relative;
    display: inline-block;
    padding: 20px;
    background: rgba(255, 255, 255, 0.95);
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  .qr-wrapper:hover {
    transform: scale(1.02);
    box-shadow: 0 24px 72px rgba(0, 0, 0, 0.5);
  }

  .qr-wrapper img {
    display: block;
    width: 220px;
    height: 220px;
    object-fit: cover;
    border-radius: 8px;
  }

  /* 角标装饰 */
  .qr-wrapper::before {
    content: '';
    position: absolute;
    top: -1px;
    left: -1px;
    right: -1px;
    bottom: -1px;
    border-radius: 17px;
    background: linear-gradient(135deg, #07c160, #2aae67, #07c160);
    z-index: -1;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .qr-wrapper:hover::before {
    opacity: 1;
  }

  .tip {
    margin-top: 28px;
    font-size: 14px;
    color: rgba(255, 255, 255, 0.5);
    line-height: 1.8;
  }

  .tip strong {
    color: #07c160;
    font-weight: 600;
  }

  /* 底部标签 */
  .tags {
    margin-top: 24px;
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 20px;
    background: rgba(7, 193, 96, 0.12);
    color: rgba(7, 193, 96, 0.8);
    border: 1px solid rgba(7, 193, 96, 0.15);
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="particles" id="particles"></div>

  <div class="card">
    <div class="wechat-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M8.691 2.188C3.891 2.188 0 5.476 0 9.53c0 2.212 1.17 4.203 3.002 5.55a.59.59 0 01.213.665l-.39 1.48c-.019.07-.048.141-.048.213 0 .163.13.295.29.295a.326.326 0 00.167-.054l1.903-1.114a.864.864 0 01.717-.098 10.16 10.16 0 002.837.403c.276 0 .543-.027.811-.05a6.127 6.127 0 01-.235-1.676c0-3.793 3.527-6.87 7.879-6.87.243 0 .482.012.718.031C17.084 4.635 13.227 2.188 8.691 2.188zm-2.85 4.56a1.1 1.1 0 11-.001 2.2 1.1 1.1 0 01.001-2.2zm5.701 0a1.1 1.1 0 110 2.2 1.1 1.1 0 010-2.2zM23.997 15.39c0-3.248-3.236-5.882-7.229-5.882-3.992 0-7.228 2.634-7.228 5.882 0 3.248 3.236 5.882 7.228 5.882.852 0 1.67-.123 2.435-.346a.71.71 0 01.588.082l1.535.9a.268.268 0 00.136.044c.132 0 .24-.108.24-.243 0-.058-.024-.117-.04-.174l-.316-1.2a.482.482 0 01.175-.546c1.548-1.126 2.476-2.797 2.476-4.6zm-9.724-1.42a.915.915 0 110 1.83.915.915 0 010-1.83zm4.99 0a.915.915 0 110 1.83.915.915 0 010-1.83z"/>
      </svg>
    </div>
    <div class="title">扫码添加微信</div>
    <div class="subtitle">专属顾问 · 一对一服务</div>
    <div class="qr-wrapper">
      <img src="wx.jpg" alt="微信二维码">
    </div>
    <div class="tip">长按或扫描二维码<br>打开<strong>微信</strong>联系销售顾问</div>
    <div class="tags">
      <span class="tag">即时响应</span>
      <span class="tag">专业咨询</span>
      <span class="tag">免费报价</span>
    </div>
  </div>

  <script>
    // 生成漂浮粒子
    const container = document.getElementById('particles');
    for (let i = 0; i < 20; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.animationDuration = (6 + Math.random() * 8) + 's';
      p.style.animationDelay = (Math.random() * 10) + 's';
      p.style.width = p.style.height = (2 + Math.random() * 3) + 'px';
      container.appendChild(p);
    }
  </script>
</body>
</html>
